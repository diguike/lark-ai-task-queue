name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # 项目零三方依赖,无需 npm install;直接跑内置测试与冒烟检查。
      - name: 语法检查
        run: |
          for f in bin/larkaq larkaq $(find src -name '*.mjs'); do node --check "$f"; done
      - name: 单元测试
        run: node --test test/
      - name: CLI 冒烟(离线命令)
        run: |
          node bin/larkaq --version
          node bin/larkaq --help >/dev/null
          node bin/larkaq config list >/dev/null
